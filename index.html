<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>基北高中交通</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body { margin:0; font-family:sans-serif; }

.topbar {
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
}

.search-box {
  display:flex;
  padding:8px;
  background:#ecf0f1;
}

.search-box input {
  flex:1;
  padding:8px;
}

.search-box button {
  padding:8px;
}

iframe {
  width:100%;
  height:55vh;
  border:none;
}

.btn {
  position:fixed;
  right:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  color:white;
}

.share { bottom:15px; background:#3498db; }
.compare { bottom:70px; background:#27ae60; }
.add { bottom:125px; background:#e67e22; }

.list {
  padding:10px;
}

.item {
  background:#f4f4f4;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="topbar">基北高中交通</div>

<!-- 搜尋 -->
<div class="search-box">
<input id="searchInput" placeholder="輸入學校名稱（點地圖後可直接貼）">
<button onclick="searchSchool()">🔍</button>
</div>

<iframe src="https://www.google.com/maps/d/embed?mid=1CwyqZQ0mLL4afResvNH5t1q2QB5xIYw"></iframe>

<!-- 比較清單 -->
<div class="list">
<h3>比較清單（最多5間）</h3>
<div id="compareList"></div>
</div>

<button class="btn share" onclick="shareLink()">分享</button>
<button class="btn compare" onclick="compare()">開始比較</button>
<button class="btn add" onclick="addFromInput()">加入比較</button>

<script>

let list = JSON.parse(localStorage.getItem("compareList")||"[]");
renderList();

// 搜尋（並記錄）
function searchSchool(){
  let q = document.getElementById("searchInput").value;
  if(!q) return;

  localStorage.setItem("lastSearch", q);

  let url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
  window.open(url);
}

// 從輸入框加入（核心）
function addFromInput(){
  let input = document.getElementById("searchInput");
  let name = input.value || localStorage.getItem("lastSearch");

  if(!name){
    name = prompt("請輸入學校名稱");
  }

  if(!name) return;

  if(list.includes(name)){
    alert("已加入");
    return;
  }

  if(list.length>=5){
    alert("最多5間");
    return;
  }

  list.push(name);
  save();

  input.value = ""; // 清空
}

// 移除
function removeSchool(name){
  list = list.filter(s=>s!==name);
  save();
}

// 顯示清單
function renderList(){
  let div = document.getElementById("compareList");
  div.innerHTML="";

  list.forEach(s=>{
    div.innerHTML += `
      <div class="item">
        ${s}
        <button onclick="removeSchool('${s}')">退出比較</button>
      </div>
    `;
  });
}

// 儲存
function save(){
  localStorage.setItem("compareList", JSON.stringify(list));
  renderList();
}

// 比較
function compare(){
  if(list.length<2){
    alert("請至少2間");
    return;
  }

  let origin = prompt("輸入出發地（例如：台北車站）");
  if(!origin) return;

  list.forEach(s=>{
    let url = "https://www.google.com/maps/dir/?api=1&origin="
      + encodeURIComponent(origin)
      + "&destination=" + encodeURIComponent(s)
      + "&travelmode=transit";

    window.open(url);
  });
}

// 分享
function shareLink(){
  let url = location.href;
  if(navigator.share){
    navigator.share({title:"基北高中交通", text:"我都用這個👉", url:url});
  }else{
    prompt("複製：", url);
  }
}

</script>

</body>
</html>
