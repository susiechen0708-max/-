<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>基北高中交通</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:sans-serif; }

.topbar {
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
}

.section {
  padding:10px;
  background:#ecf0f1;
}

iframe {
  width:100%;
  height:45vh;
  border:none;
}

.item {
  background:#f4f4f4;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.suggestion {
  background:white;
  border:1px solid #ccc;
  margin-top:5px;
  max-height:200px;
  overflow:auto;
}

.suggestion div {
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.suggestion div:hover {
  background:#f0f0f0;
}

.link {
  color:blue;
  text-decoration:underline;
}

/* 比較標題 */
.compare-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.compare-btn {
  background:#27ae60;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-size:14px;
}

/* 🔥 圖例樣式 */
.legend {
  margin-top:10px;
  font-size:14px;
}

.legend-row {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:5px;
}

.legend-item {
  display:flex;
  align-items:center;
  gap:5px;
}

/* 圖示 */
.icon {
  width:14px;
  height:14px;
  display:inline-block;
}

.star { background:green; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
.diamond { background:green; transform: rotate(45deg); }
.square { background:purple; }
.circle { background:purple; border-radius:50%; }
.arrow { 
  width:0;
  height:0;
  border-left:7px solid transparent;
  border-right:7px solid transparent;
  border-bottom:14px solid purple;
}
</style>
</head>

<body>

<div class="topbar">基北高中交通</div>

<!-- 地址 -->
<div class="section">
<b>我的地址：</b>
<span id="myAddr"></span>
<button onclick="setAddress()">設定 / 修改</button>
</div>

<!-- 搜尋 -->
<div class="section">
<input id="searchInput" placeholder="輸入學校關鍵字" oninput="showSuggestions()">
<button onclick="addSchool()">加入比較</button>
<div id="suggestBox" class="suggestion"></div>
</div>

<!-- 地圖 -->
<iframe src="https://www.google.com/maps/d/embed?mid=1CwyqZQ0mLL4afResvNH5t1q2QB5xIYw"></iframe>

<!-- 比較清單 -->
<div class="section">
<b>比較清單（最多5間）</b>
<div id="list"></div>

<!-- 🔥 圖例（新增） -->
<div class="legend">
  <b>圖例說明：</b>
  <div class="legend-row">

    <!-- 綠色（高中） -->
    <div class="legend-item"><span class="icon star"></span>公立高中</div>
    <div class="legend-item"><span class="icon diamond"></span>私立高中</div>

    <!-- 紫色（高職） -->
    <div class="legend-item"><span class="icon square"></span>公立高職</div>
    <div class="legend-item"><span class="icon circle"></span>私立高職</div>
    <div class="legend-item"><span class="icon arrow"></span>北區五專</div>

  </div>
</div>

</div>

<!-- 比較結果 -->
<div class="section">
  <div class="compare-header">
    <b>比較結果（點擊校名查看路線）</b>
    <button class="compare-btn" onclick="compare()">產生比較</button>
  </div>
  <div id="result"></div>
</div>

<script>

// ✅ 完整學校清單（務必保留）
const schools = [
"臺北科技大學","臺北商業大學","臺北城市科技大學","致理科技大學","宏國德霖科技大學",
"台北海洋科技大學（淡水）","台北海洋科技大學（士林）","黎明技術學院","德育護專",
"馬偕護專（關渡）","馬偕護專（三芝）","耕莘護專（新店）","康寧大學","中華科技大學（台北）",
"龍華科技大學","聖母護專","新生護專","慈濟大學","華僑高中","泰山高中","板橋高中",
"新店高中","中和高中","新莊高中","新北高中","林口高中","海山高中","三重高中",
"永平高中","樹林高中","明德高中","秀峰高中","金山高中","安康高中","雙溪高中",
"石碇高中","丹鳳高中","清水高中","三民高中","錦和高中","光復高中","竹圍高中",
"北大高中","基隆女中","基隆高中","基隆中山高中","安樂高中","暖暖高中","八斗高中",
"西松高中","中崙高中","松山高中","永春高中","師大附中","和平高中","芳和實中",
"中山女中","市立大同高中","大直高中","建國中學","成功中學","北一女中","明倫高中",
"成淵高中","華江高中","大理高中（北市大附中）","政大附中","景美女中","萬芳高中",
"數位實中（弘道）","數位實中（吉林）","南港高中","育成高中","內湖高中","麗山高中",
"南湖高中","陽明高中","百齡高中","市立復興高中","中正高中","瑞芳高工","三重商工",
"新北高工","淡水商工","鶯歌工商","樟樹實中","海大附中","基隆商工","松山家商",
"松山工農","大安高工","木柵高工","南港高工","內湖高工","士林高商",
"台灣戲曲學院（內湖）","台灣戲曲學院（木柵）","淡江高中","康橋高中","金陵女中",
"裕德高中","南山高中","恆毅高中","聖心女中","崇義高中","格致高中","醒吾高中",
"徐匯高中","崇光高中","光仁高中","竹林高中","中信高中","辭修高中","林口康橋高中",
"時雨高中","二信高中","輔大聖心高中","延平中學","私立復興實中","靜修高中","東山高中",
"再興中學","靜心高中","達人高中","衛理女中","華興中學","薇閣高中","幼華高中",
"奎山實中","東海高中","樹人家商","私立復興商工","穀保家商","智光商工","能仁家商",
"豫章工商","莊敬工家","中華商海","培德工家","育達高中","協和祐德高中","金甌女中",
"東方工商","喬治工商","開平餐飲","私立大同高中","稻江護家","新民高中","開南高中",
"稻江商職","滬江高中","景文高中","泰北高中","華岡藝校","惇敘工商",
"光華高商進修學校","南華高中進修學校","志仁中學進修學校"
];

let list = JSON.parse(localStorage.getItem("schools")||"[]");
let myAddr = localStorage.getItem("myAddr");

if(!myAddr){
  setAddress();
}else{
  document.getElementById("myAddr").innerText = myAddr;
}

render();

function setAddress(){
  let addr = prompt("設定我的地址（例如：台北市忠孝東路段1號）");
  if(!addr) return;
  localStorage.setItem("myAddr", addr);
  myAddr = addr;
  document.getElementById("myAddr").innerText = addr;
}

function showSuggestions(){
  let input = document.getElementById("searchInput").value;
  let box = document.getElementById("suggestBox");
  box.innerHTML = "";
  if(!input) return;

  let match = schools.filter(s => s.includes(input));
  match.forEach(s=>{
    box.innerHTML += `<div onclick="selectSchool('${s}')">${s}</div>`;
  });
}

function selectSchool(name){
  document.getElementById("searchInput").value = name;
  document.getElementById("suggestBox").innerHTML = "";
}

function addSchool(){
  let name = document.getElementById("searchInput").value;
  if(!name){ alert("請先選擇學校"); return; }
  if(list.includes(name)){ alert("已加入"); return; }
  if(list.length>=5){ alert("最多5間"); return; }

  list.push(name);
  save();
  document.getElementById("searchInput").value="";
}

function removeSchool(name){
  list = list.filter(s => s !== name);
  save();
}

function render(){
  let div = document.getElementById("list");
  div.innerHTML="";
  if(list.length===0){ div.innerHTML="尚未加入學校"; return; }

  list.forEach(s=>{
    div.innerHTML += `
      <div class="item">
        <span>${s}</span>
        <button onclick="removeSchool('${s}')">移除比較</button>
      </div>
    `;
  });
}

function compare(){
  if(!myAddr){ alert("請先設定地址"); return; }

  let div = document.getElementById("result");
  div.innerHTML="";

  list.forEach(s=>{
    let url = "https://www.google.com/maps/dir/?api=1&origin="
      + encodeURIComponent(myAddr)
      + "&destination=" + encodeURIComponent(s)
      + "&travelmode=transit";

    div.innerHTML += `
      <div class="item">
        <a class="link" href="${url}" target="_blank">${s}</a>
      </div>
    `;
  });
}

function save(){
  localStorage.setItem("schools", JSON.stringify(list));
  render();
}

</script>

</body>
</html>
