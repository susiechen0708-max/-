<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>基北高中交通</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body { margin:0; font-family:sans-serif; }

.topbar {
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
}

.section {
  padding:10px;
  background:#ecf0f1;
}

iframe {
  width:100%;
  height:45vh;
  border:none;
}

.btn {
  position:fixed;
  right:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  color:white;
}

.add { bottom:125px; background:#e67e22; }
.compare { bottom:70px; background:#27ae60; }
.share { bottom:15px; background:#3498db; }

.item {
  background:#f4f4f4;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.suggestion {
  background:white;
  border:1px solid #ccc;
  margin-top:5px;
  max-height:200px;
  overflow:auto;
}

.suggestion div {
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.suggestion div:hover {
  background:#f0f0f0;
}

.link {
  color:blue;
}
</style>
</head>

<body>

<div class="topbar">基北高中交通</div>

<!-- 地址 -->
<div class="section">
<b>我的地址：</b>
<span id="myAddr"></span>
<button onclick="setAddress()">設定 / 修改</button>
</div>

<!-- 搜尋 -->
<div class="section">
<input id="searchInput" placeholder="輸入學校關鍵字" oninput="showSuggestions()">
<button onclick="addSchool()">加入比較</button>
<div id="suggestBox" class="suggestion"></div>
</div>

<!-- 地圖 -->
<iframe src="https://www.google.com/maps/d/embed?mid=1CwyqZQ0mLL4afResvNH5t1q2QB5xIYw"></iframe>

<!-- 比較清單 -->
<div class="section">
<b>比較清單（最多5間）</b>
<div id="list"></div>
</div>

<!-- 比較結果 -->
<div class="section">
<b>比較結果（點擊查看路線）</b>
<div id="result"></div>
</div>

<!-- 浮動按鈕 -->
<button class="btn add" onclick="addSchool()">加入比較</button>
<button class="btn compare" onclick="compare()">產生比較</button>
<button class="btn share" onclick="shareLink()">分享</button>

<script>

// ✅ 完整學校清單（保留）
const schools = [/* ← 這裡請保留你原本完整清單（不要刪） */];

// 資料
let list = JSON.parse(localStorage.getItem("schools")||"[]");
let myAddr = localStorage.getItem("myAddr");

// 初始化
if(!myAddr){
  setAddress();
}else{
  document.getElementById("myAddr").innerText = myAddr;
}
render();

// 地址
function setAddress(){
  let addr = prompt("設定我的地址（例如：台北車站）");
  if(!addr) return;

  localStorage.setItem("myAddr", addr);
  myAddr = addr;
  document.getElementById("myAddr").innerText = addr;
}

// 🔍 關鍵字篩選
function showSuggestions(){
  let input = document.getElementById("searchInput").value;
  let box = document.getElementById("suggestBox");

  box.innerHTML = "";
  if(!input) return;

  let match = schools.filter(s => s.includes(input));

  match.forEach(s=>{
    box.innerHTML += `<div onclick="selectSchool('${s}')">${s}</div>`;
  });
}

// 選擇（只填入）
function selectSchool(name){
  document.getElementById("searchInput").value = name;
  document.getElementById("suggestBox").innerHTML = "";
}

// 🔥 加入比較（核心）
function addSchool(){
  let name = document.getElementById("searchInput").value;

  if(!name){
    alert("請先選擇學校");
    return;
  }

  if(list.includes(name)){
    alert("已加入");
    return;
  }

  if(list.length>=5){
    alert("最多5間");
    return;
  }

  list.push(name);
  save();

  // UX：清空輸入框
  document.getElementById("searchInput").value = "";
  document.getElementById("suggestBox").innerHTML = "";
}

// 🔥 移除比較（修正）
function removeSchool(name){
  list = list.filter(s => s !== name);
  save();
}

// 🔥 顯示清單（核心修正）
function render(){
  let div = document.getElementById("list");
  div.innerHTML = "";

  if(list.length === 0){
    div.innerHTML = "尚未加入學校";
    return;
  }

  list.forEach(s=>{
    div.innerHTML += `
      <div class="item">
        <span>${s}</span>
        <button onclick="removeSchool('${s}')">移除比較</button>
      </div>
    `;
  });
}

// 比較
function compare(){
  if(!myAddr){
    alert("請先設定地址");
    return;
  }

  if(list.length === 0){
    alert("請先加入學校");
    return;
  }

  let div = document.getElementById("result");
  div.innerHTML = "";

  list.forEach(s=>{
    let url = "https://www.google.com/maps/dir/?api=1&origin="
      + encodeURIComponent(myAddr)
      + "&destination=" + encodeURIComponent(s)
      + "&travelmode=transit";

    div.innerHTML += `
      <div class="item">
        <b>${s}</b><br>
        <a class="link" href="${url}" target="_blank">👉 查看通勤路線</a>
      </div>
    `;
  });

  window.scrollTo(0, document.body.scrollHeight);
}

// 分享
function shareLink(){
  let url = location.href;
  if(navigator.share){
    navigator.share({title:"基北高中交通", text:"我都用這個👉", url:url});
  }else{
    prompt("複製：", url);
  }
}

</script>

</body>
</html>
